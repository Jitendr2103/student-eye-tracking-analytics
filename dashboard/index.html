<!DOCTYPE educator>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Educator Analytics Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for premium typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Chart.js for data visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- PapaParse for CSV parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>
    <div class="background-mesh"></div>
    
    <div class="container">
        <header>
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                <h1>Student Analytics Dashboard</h1>
            </div>
            
            <div class="upload-section">
                <label for="csv-upload" class="upload-btn">
                    Upload Student Data (timeseries_*.csv)
                </label>
                <input type="file" id="csv-upload" accept=".csv" style="display: none;">
            </div>
        </header>

        <main id="dashboard-content" class="hidden">
            <section class="summary-cards">
                <div class="card glass">
                    <h3>Average Attention</h3>
                    <div class="value" id="avg-attention">--%</div>
                    <div class="subtitle">Session total</div>
                </div>
                <div class="card glass">
                    <h3>Total Distractions</h3>
                    <div class="value" id="total-distractions">--</div>
                    <div class="subtitle">Times looked away</div>
                </div>
                <div class="card glass">
                    <h3>Peak Confusion</h3>
                    <div class="value" id="peak-confusion">--</div>
                    <div class="subtitle">Most frequent state</div>
                </div>
            </section>

            <section class="charts-grid">
                <div class="chart-container glass">
                    <h3>Attention Over Time</h3>
                    <canvas id="attentionChart"></canvas>
                </div>
                <div class="chart-container glass">
                    <h3>Cumulative Distractions</h3>
                    <canvas id="distractionsChart"></canvas>
                </div>
            </section>
        </main>
        
        <div id="empty-state" class="empty-state glass">
            <h2>No Data Loaded</h2>
            <p>Upload a timeseries CSV file generated by the Eye Tracker application to view insights.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
